name: Guitar Watcher

on:
  schedule:
    - cron: '*/30 * * * *'   # 30분마다 실행 (UTC 기준, 실제 실행은 몇 분 정도 밀릴 수 있음)
  workflow_dispatch: {}       # Actions 탭에서 수동 실행 버튼도 사용 가능

permissions:
  contents: write             # seen.json을 다시 commit/push 하기 위해 필요

concurrency:
  group: guitar-watcher
  cancel-in-progress: false   # 이전 실행이 끝나기 전엔 새 실행을 기다리게 함 (commit 충돌 방지)

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 main.py

      - name: Commit updated seen.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git diff --cached --quiet || git commit -m "chore: update seen.json"
          git push
